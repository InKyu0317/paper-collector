name: Scheduled Paper Collection

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      collection:
        description: "Collection name to run (leave empty for all)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collection
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          PAPER_COLLECTOR_LOG_LEVEL: INFO
          PAPER_COLLECTOR_LOG_FORMAT: json
        run: |
          if [ -n "${{ github.event.inputs.collection }}" ]; then
            python workflows/scheduled.py
          else
            python workflows/scheduled.py
          fi

      - name: Commit collected papers
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collections/
          git diff --staged --quiet || git commit -m "chore: collect papers ($(date -u +%Y-%m-%d))"
          git push
