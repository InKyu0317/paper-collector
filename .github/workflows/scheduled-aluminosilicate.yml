name: Scheduled Collection - Aluminosilicate x Plasma Resistance

permissions:
  contents: write

on:
  schedule:
    # Daily at 02:00 UTC (11:00 KST)
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    concurrency:
      group: paper-collector-commit
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run collection
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          PAPER_COLLECTOR_LOG_LEVEL: INFO
          PAPER_COLLECTOR_LOG_FORMAT: json
          PAPER_COLLECTOR_COLLECTIONS: aluminosilicate
          PAPER_COLLECTOR_KEYWORDS: plasma resistance
          PAPER_COLLECTOR_YEARS_BACK: "5"
          PAPER_COLLECTOR_QUALITY_TIER: Q1
        run: python workflows/scheduled.py

      - name: Commit collected papers
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -f collections/
          git diff --staged --quiet || git commit -m "chore: collect aluminosilicate x plasma-resistance ($(date -u +%Y-%m-%d))"
          git push
