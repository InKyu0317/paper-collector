name: Manual Paper Collection (ad-hoc)

permissions:
  contents: write

# Manual-only. Scheduled runs are handled by:
#   - scheduled-aluminosilicate.yml  (aluminosilicate x plasma resistance, Q1)
#   - scheduled-halide.yml           (halide-solid-state-battery x ionic conductivity, Q1)
on:
  workflow_dispatch:
    inputs:
      collection:
        description: "Preset collection name (aluminosilicate, halide-solid-state-battery, or comma-separated). Leave empty for all presets."
        required: false
        default: ""
      keywords:
        description: "Custom search keywords (comma-separated). Creates dynamic collections. e.g. 'plasma resistance, solid electrolyte'"
        required: false
        default: ""
      years:
        description: "Collect papers from the last N years (e.g., 5). Leave empty for default (5 years)."
        required: false
        default: ""
      quality_tier:
        description: "Journal quality tier (SJR-based). Q1 = top 25%, Q2 = top 50%, etc."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - Q1
          - Q2
          - Q3
          - Q4

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run collection
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          PAPER_COLLECTOR_LOG_LEVEL: INFO
          PAPER_COLLECTOR_LOG_FORMAT: json
          PAPER_COLLECTOR_COLLECTIONS: ${{ github.event.inputs.collection || 'aluminosilicate,halide-solid-state-battery' }}
          PAPER_COLLECTOR_KEYWORDS: ${{ github.event.inputs.keywords || '' }}
          PAPER_COLLECTOR_YEARS_BACK: ${{ github.event.inputs.years || '5' }}
          PAPER_COLLECTOR_QUALITY_TIER: ${{ github.event.inputs.quality_tier || 'all' }}
        run: python workflows/scheduled.py

      - name: Commit collected papers
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f collections/
          git diff --staged --quiet || git commit -m "chore: collect papers ($(date -u +%Y-%m-%d))"
          git push
