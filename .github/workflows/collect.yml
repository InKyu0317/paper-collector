name: Paper Collector — Scheduled Collection

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper collector
        env:
          PAPER_COLLECTOR_DATA_DIR: ./collections
          PAPER_COLLECTOR_OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          PAPER_COLLECTOR_CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          PAPER_COLLECTOR_UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          PAPER_COLLECTOR_LOG_LEVEL: INFO
          PAPER_COLLECTOR_LOG_FORMAT: json
          PAPER_COLLECTOR_COLLECTIONS: aluminosilicate,halide-solid-state-battery
        run: python workflows/scheduled.py

      - name: Upload collection artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paper-collections
          path: collections/
          retention-days: 7

      - name: Create summary
        if: always()
        run: |
          echo "## Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for coll in aluminosilicate halide-solid-state-battery; do
            if [ -d "collections/$coll/papers" ]; then
              count=$(find "collections/$coll/papers" -name "metadata.json" | wc -l | tr -d ' ')
              echo "- **$coll**: $count papers" >> $GITHUB_STEP_SUMMARY
            fi
          done
